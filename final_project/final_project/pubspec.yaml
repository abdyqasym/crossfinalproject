name: car_buying_app
description: A Flutter car buying marketplace application.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ──────────────────────────────────────────────────
  firebase_core: ^2.27.1
  firebase_auth: ^4.17.9
  cloud_firestore: ^4.15.10          # Firestore (order history)

  # ── Navigation (requirement: go_router) ──────────────────────
  go_router: ^13.2.4

  # ── State / DI (requirement: Riverpod) ───────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Networking (requirement: Chopper) ────────────────────────
  chopper: ^7.1.0

  # ── Local persistence (requirement: Drift + SharedPreferences)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0
  shared_preferences: ^2.2.3

  # ── Serialization (requirement: JSON → Dart model classes) ───
  json_annotation: ^4.9.0

  # ── UI helpers ───────────────────────────────────────────────
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: 2.3.9
  drift_dev: ^2.18.0
  json_serializable: ^6.8.0
  chopper_generator: ^7.4.0

flutter:
  uses-material-design: true